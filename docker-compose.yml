services:
  jellytulli:
    image: ghcr.io/maelmoreau21/jellytulli:latest
    container_name: jellytulli_app
    ports:
      - "${APP_PORT:-3000}:${PORT:-3000}"
    environment:
      # ─── Identifiants PostgreSQL (doivent correspondre au service postgres ci-dessous) ───
      POSTGRES_USER: jellytulli
      POSTGRES_PASSWORD: 'jellytulli_password'
      POSTGRES_IP: postgres                        # Nom du service Docker, ou IP (ex: 127.0.0.1 en mode host)
      POSTGRES_PORT: 5432
      POSTGRES_DB: jellytulli
      # Aliases DB_* (prioritaires si définis) pour mode host/réseau custom
      DB_HOST: ${DB_HOST:-}
      DB_PORT: ${DB_PORT:-}
      DB_USER: ${DB_USER:-}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_NAME: ${DB_NAME:-}
      # ─── Redis ───
      REDIS_URL: redis://redis:6379
      # ─── Port de JellyTulli (changer aussi dans ports: ci-dessus) ───
      PORT: ${PORT:-3000}
      # ─── Jellyfin ───
      JELLYFIN_URL: http://jellyfin:8096           # IP réelle du serveur Jellyfin (pas localhost en Docker)
      JELLYFIN_API_KEY: your-jellyfin-api-key
      # ─── Authentification ───
      ADMIN_PASSWORD: supersecretadmin             # ← À changer !
      NEXTAUTH_SECRET: your-generated-random-secret # ← À changer ! (openssl rand -base64 32)
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000} # ← adapter au port externe APP_PORT
      # ─── Divers ───
      PUID: 1000
      PGID: 1000
      BACKUP_DIR: /data/backups
    volumes:
      - jellytulli_backups:/data/backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jellytulli_net
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    container_name: jellytulli_postgres
    environment:
      POSTGRES_USER: jellytulli
      POSTGRES_PASSWORD: jellytulli_password
      POSTGRES_DB: jellytulli
    volumes:
      - jellytulli_pgdata:/var/lib/postgresql
    networks:
      - jellytulli_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jellytulli"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: jellytulli_redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - jellytulli_redisdata:/data
    networks:
      - jellytulli_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  jellytulli_net:
    driver: bridge

volumes:
  jellytulli_pgdata:
  jellytulli_redisdata:
  jellytulli_backups:
